name: test github token

on: 
  push:
    branches:
      "test_creds"

jobs:
  test_github_token:
    runs-on: ubuntu-latest
    steps:
      - name: Test Github Token
        run: |
          echo "::add-mask::${{ secrets.MAPLIBRE_NATIVE_PRIVATE_TOKEN }}"
          curl -L \
            -X PUT \
            -H "Accept: application/vnd.github.json" \
            -H "Authorization: token ${{ secrets.MAPLIBRE_NATIVE_PRIVATE_TOKEN }}" \
            -H "X-Github-Api-Version: 2022-11-28" \
            https://api.github.com/repos/HudHud-Maps/maplibre-gl-native-distribution/actions/workflows/release.yml/enable